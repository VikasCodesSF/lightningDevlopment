<template>
    <lightning-card title="WireGetRatingPicklist" icon-name="custom:custom67">
        <ul class="slds-var-m-around_medium">
            <template for:each={ratings} for:item="rating" for:index="index">
                <li key={rating.index}>
                    {rating.label}
                </li>
            </template>
        </ul>
    </lightning-card>


    <lightning-card title="WireGetRatingPicklist" icon-name="custom:custom67">
        <lightning-combobox
            label="Status"
            value={value}
            placeholder="Industry"
            options={industryoptions}
            onchange={handleChange} ></lightning-combobox>
    </lightning-card>


    <lightning-card title="getPicklistValuesByRecordType 1" icon-name="custom:custom67">
        <lightning-combobox
            label="Active"
            value={selectedActive}
            options={Active}
            onchange={handlePicklisthange} ></lightning-combobox>
    </lightning-card>


    <lightning-card title="getPicklistValuesByRecordType 2" icon-name="custom:custom67">
        <lightning-combobox
            label="SLA"
            value={selectedSLA}
            options={SLA}
            onchange={handlePicklisthange} ></lightning-combobox>
    </lightning-card>
</template>
