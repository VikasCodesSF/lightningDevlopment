<template>
    <div>
        <lightning-datatable
            key-field="Id"
            data={contactData}
            columns={contactColumns}
            onrowaction={handleRowAction}
            sorted-by={sortBy}
            default-sort-direction={defaultSortDirection}
            sorted-direction={sortDirection}
            onsort={doSorting}
            onheaderaction={handleHeaderAction}
            hide-checkbox-column
            show-row-number-column
            row-number-offset="0">
        </lightning-datatable>
    </div>
    
</template>
