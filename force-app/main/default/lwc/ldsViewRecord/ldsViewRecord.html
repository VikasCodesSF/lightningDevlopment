<template>
    <lightning-card variant="Narrow" title="View Record" icon-name="standard:account">
        <!--Example with layout-type-->
        <div class="slds-p-horizontal_medium">
            <lightning-record-view-form
                        record-id={recordId}
                        object-api-name={objectApiName}>
                <div class="slds-box slds-theme_default">
                    <lightning-output-field field-name="Name"></lightning-output-field>
                    <lightning-output-field field-name="Rating"></lightning-output-field>
                </div>
                <div class="slds-box slds-theme_default">
                    <lightning-output-field field-name="Industry"></lightning-output-field>
                    <lightning-output-field field-name="Active__c"></lightning-output-field>
                </div>
            </lightning-record-view-form>
        </div>
    </lightning-card>
</template>
