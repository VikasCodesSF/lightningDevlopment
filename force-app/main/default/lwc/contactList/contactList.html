<template>
    <lightning-card title="Contact List">
        <div class="slds-var-p-around_medium" onselect = {handleSelectEvent}>
            <template if:true={contacts} for:each={contacts} for:item="con">
                <c-contact-title key ={con.Id} contact={con}></c-contact-title>
            </template>
        </div>
    </lightning-card>
</template>
