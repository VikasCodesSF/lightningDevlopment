<template>
    <lightning-card title="Create Account (Filtered by Edited Fields)" icon-name="standard:account">
        <div class="slds-var-p-around_medium slds-grid slds-gutters">
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                <lightning-input
                    type="text"
                    label="Account Name"
                    value={accountName}
                    onchange={handleAccountName}>
                </lightning-input>

                <lightning-input
                    type="tel"
                    label="Phone"
                    value={accountPhone}
                    onchange={handleAccountPhone}>
                </lightning-input>

                <lightning-input
                    type="url"
                    label="Website"
                    value={accountWebsite}
                    onchange={handleAccountWebsite}>
                </lightning-input>

                <div class="slds-m-top_medium">
                    <lightning-button
                        variant="brand"
                        label="Create Account"
                        onclick={createAccount}
                        disabled={creating}>
                    </lightning-button>
                    <template if:true={creating}>
                        <lightning-spinner alternative-text="Creating..." size="small" class="slds-m-left_small"></lightning-spinner>
                    </template>
                </div>
            </div>
        </div>
    </lightning-card>
</template>
