<template>
    <lightning-card title="Apex Wire To Property Demo">
        <lightning-button variant="brand" label="Call Account Method" 
        onclick={handleClick} class="slds-m-left_x-small"></lightning-button>

        <div class="slds-p-around_medium">
            <template if:true={accounts}>
                <template for:each={accounts} for:item="account">
                    <div class="slds-box slds-box_xx-small" key={account.Id}>
                        <p><strong>Name : </strong> {account.Name}</p>
                        <p><strong>Type : </strong> {account.Type}</p>
                        <p><strong>Industry : </strong> {account.Industry}</p>
                    </div>
                </template>
            </template>
        </div>        
    </lightning-card> 

    <lightning-card title="Apex Wire To Property Parameter Demo">
        <div class="slds-p-around_medium">
        <lightning-input 
            type="text" 
            label="Search Account" 
            value={searchKey} 
            onchange={handleNameChange}>
        </lightning-input>
        </div> 

        <div class="slds-p-around_medium">
            <template if:true={accountParamas}>
                <template for:each={accountParamas} for:item="account">
                    <div class="slds-box slds-box_xx-small" key={account.Id}>
                        <p><strong>Name : </strong> {account.Name}</p>
                        <p><strong>Type : </strong> {account.Type}</p>
                        <p><strong>Industry : </strong> {account.Industry}</p>
                    </div>
                </template>
            </template>
        </div>        
    </lightning-card> 
</template>
